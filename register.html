<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register for User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="register.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  </head>
  <body>
    <nav class="topnav">
      <div class="topnav-logo">
        <img src="https://img.icons8.com/?size=100&id=O_27qvGZ5ys7&format=png&color=FFFFFF" alt="logo">
      </div>
      <div class="topnav-links">
        <a href="login.html"><i class="bx bxs-home"></i>Home</a>
        <a href="login.html"><i class="bx bxs-user"></i>Login</a>
      </div>
    </nav>
    <div class="login-wrapper">
      <div class="login-card">
        <img src="https://img.icons8.com/?size=100&id=zxB19VPoVLjK&format=png&color=000000" alt="user" class="user-icon">
        <h1 class="info-user">Welcome</h1>
        <div class="input-box">
          <i class="bx bxs-user"></i>
          <input type="text" name="user" id="user" placeholder="Type your user...">
        </div>
        <div class="input-box">
          <i class="bx bxs-lock-alt"></i>
          <input type="password" name="password" id="password" placeholder="Type your password...">
        </div>
        <p id="alerta"></p>
        <button type="button" class="btn" id="button-1">Register</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
      let mensagem = document.getElementById('alerta');
      let button_1 = document.getElementById('button-1');
      let name = document.getElementById('user');
      let senha = document.getElementById('password');

      button_1.addEventListener("click", () => {
        if (name.value == "" && senha.value == ""){
          mensagem.textContent = "Prencha todos os campos prfv!!!";
        } 
        else {
          window.location.href = "index.html";
        }
      });
    </script>
  </body>
</html>
